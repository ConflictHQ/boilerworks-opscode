# ingress-nginx — Azure
# Ingress controller for AKS clusters.

controller:
  replicaCount: 1

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
