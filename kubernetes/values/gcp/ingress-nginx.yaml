# ingress-nginx — GCP
# Ingress controller for GKE clusters.

controller:
  replicaCount: 1

  service:
    type: LoadBalancer
    annotations:
      cloud.google.com/neg: '{"ingress": true}'

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
