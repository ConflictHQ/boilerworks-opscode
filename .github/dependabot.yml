version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "terraform"
    directory: "/aws/tf-backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "terraform"
    directory: "/aws/environments/dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "terraform"
    directory: "/aws/environments/stg"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "terraform"
    directory: "/aws/environments/prd"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
